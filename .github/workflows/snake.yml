name: Generate Snake Animation

on:
  # Runs automatically every 12 hours
  schedule:
    - cron: "0 */12 * * *"
  
  # Allows manual trigger from Actions tab
  workflow_dispatch:
  
  # Runs on push to main branch
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    permissions:
      contents: write
    
    steps:
      - name: Generate Snake Animation (Dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: hariprakash0804
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=8B5CF6&color_dots=#0D1117,#0e4429,#006d32,#26a641,#39d353
      
      - name: Generate Snake Animation (Light)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: hariprakash0804
          outputs: |
            dist/github-snake.svg?palette=github&color_snake=8B5CF6
      
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
